name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ProQuote.slnx

      - name: Build
        run: dotnet build ProQuote.slnx --configuration Debug --no-restore

      - name: Test
        run: dotnet test ProQuote.slnx --configuration Debug --no-build --logger "trx;LogFileName=test-results.trx"
